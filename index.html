<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Chat Hub</title>
    <link rel="icon" href="assets/favicon.ico" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <header>
        <h1>Stream Chat Hub</h1>
        <button id="theme-toggle-btn" class="control-btn" aria-label="Toggle theme">☀️ Light Mode</button>
        <button id="manager-toggle-btn" class="control-btn">⚙️ Manage Sources</button>
    </header>
    <div id="status-banner" class="status-banner hidden"></div>

    <div id="source-manager-panel" class="dropdown-panel hidden">
        <div class="panel-header">
            <span>Manage chat sources</span>
            <button id="close-panel-btn" class="control-btn">✕</button>
        </div>
        <div class="add-source-form">
            <div class="platform-selector-wrapper">
                <button id="platform-toggle-btn" class="platform-toggle">
                    <img id="platform-icon-preview" src="assets/twch_icon.png" alt="" class="platform-icon-small">
                    <span id="platform-label-preview">Twitch</span>
                </button>
                <div id="platform-dropdown" class="platform-dropdown hidden">
                    <button class="platform-option" data-platform="twitch">
                        <img src="assets/twch_icon.png" alt="" class="platform-icon-small">
                        <span>Twitch</span>
                    </button>
                    <button class="platform-option" data-platform="youtube">
                        <img src="assets/tube_icon.png" alt="" class="platform-icon-small">
                        <span>YouTube</span>
                    </button>
                    <button class="platform-option" data-platform="tiktok">
                        <img src="assets/tktk_icon.png" alt="" class="platform-icon-small">
                        <span>TikTok</span>
                    </button>
                    <button class="platform-option" data-platform="facebook">
                        <img src="assets/fb_icon.png" alt="" class="platform-icon-small">
                        <span>Facebook</span>
                    </button>
                    <button class="platform-option" data-platform="instagram">
                        <img src="assets/ins_icon.png" alt="" class="platform-icon-small">
                        <span>Instagram</span>
                    </button>
                </div>
            </div>
            <input type="text" id="target-input" placeholder="Channel Name or Stream URL...">
            <button id="add-btn" class="action-btn">Add</button>
        </div>
        <div id="active-sources-list" class="sources-grid"></div>
    </div>

    <main id="chat-timeline"></main>

    <script src="app.js"></script>
</body>
</html>
